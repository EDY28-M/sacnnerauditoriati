server {
    listen 80;
    server_name audit.keraai.online;

    # Redirigir HTTP -> HTTPS (se activa después de certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name audit.keraai.online;

    # SSL - se genera con certbot (ver abajo)
    ssl_certificate     /etc/letsencrypt/live/audit.keraai.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/audit.keraai.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy hacia Node.js (puerto 5000)
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
